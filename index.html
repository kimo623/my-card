<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>卡費管家 v2.2.12</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; color: var(--primary); margin: 0; }
        .container { max-width: 600px; margin: auto; padding-bottom: 50px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin: 10px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        button:active { opacity: 0.7; }
        .status-bar { font-size: 12px; text-align: center; color: #666; padding: 10px; background: #e0e0e0; border-radius: 8px; margin-bottom: 10px; font-weight: bold; }
        .tag { font-size: 10px; padding: 2px 5px; background: #eef7ff; color: #3498db; border-radius: 4px; margin-right: 5px; }
        .list-chip { display: flex; justify-content: space-between; background: #f0f0f0; padding: 8px 12px; border-radius: 6px; margin-bottom: 5px; font-size: 13px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">💳 卡費管家 v2.2.12</h2>
    <div id="syncStatus" class="status-bar">📡 狀態：等待連線</div>

    <div class="card">
        <textarea id="ai_text" rows="2" placeholder="貼上簡訊自動解析..." oninput="parseSms()"></textarea>
        <div class="grid" style="margin-top:10px;">
            <select id="f_card"><option value="">請先新增卡片</option></select>
            <input type="date" id="f_date">
        </div>
        <div class="grid">
            <input type="number" id="f_amt" placeholder="金額">
            <select id="f_mem"></select>
        </div>
        <input type="text" id="f_item" placeholder="品項/備註" style="margin-bottom:8px;">
        <button onclick="addRecord()" style="background:var(--success); color:white;">➕ 存入並同步</button>
    </div>

    <div id="main_list"></div>

    <div class="card" style="border-top: 5px solid var(--primary);">
        <h3>💳 卡片管理 (必填)</h3>
        <div id="ui_cards"></div>
        <input type="text" id="add_c_name" placeholder="卡片名稱 (如: 國泰)">
        <div class="grid" style="margin-top:5px;">
            <input type="number" id="add_c_close" placeholder="結帳日 (1-31)">
            <input type="number" id="add_c_pay" placeholder="扣款日 (1-31)">
        </div>
        <button onclick="addNewCard()" style="background:var(--primary); color:white; margin-top:5px;">新增信用卡</button>
    </div>

    <div class="card">
        <h3>👥 成員管理</h3>
        <div id="ui_mems"></div>
        <div class="grid">
            <input type="text" id="add_m_name" placeholder="成員名稱">
            <input type="text" id="add_m_emoji" placeholder="圖示 (Emoji)">
        </div>
        <button onclick="addNewMem()" style="background:var(--accent); color:white; margin-top:5px;">新增成員代刷</button>
    </div>

    <div class="card" style="margin-top:30px; border-top: 5px solid var(--accent); background: #fffde7;">
        <h3>⚙️ 雲端同步設定</h3>
        <input type="password" id="cfg_token" placeholder="GitHub Token (ghp_...)">
        <input type="text" id="cfg_gist" placeholder="Gist ID" style="margin-top:5px;">
        <button onclick="saveAndSync()" style="background:var(--accent); color:white; margin-top:10px;">💾 儲存並嘗試下載資料</button>
        <p style="font-size: 11px; color: #888; margin-top: 5px;">* 若顯示網路攔截，請手動檢查 Token 頭尾是否有空格</p>
    </div>
</div>

<script>
    const DB_KEY = "CARD_DB_V2212";
    const SET_KEY = "CARD_SET_V2212";

    // 初始資料檢查
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || { 
        cards: {}, 
        records: [], 
        members: { "自己": "👤" } 
    };
    // 確保 members 存在
    if(!db.members) db.members = { "自己": "👤" };
    
    let settings = JSON.parse(localStorage.getItem(SET_KEY)) || { token: "", gistId: "" };

    function updateUI() {
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        render();
    }

    function render() {
        // 更新下拉選單
        const cS = document.getElementById('f_card');
        const mS = document.getElementById('f_mem');
        if(cS && mS) {
            cS.innerHTML = Object.keys(db.cards).length ? "" : `<option value="">請先新增卡片</option>`;
            Object.keys(db.cards).forEach(k => cS.innerHTML += `<option value="${k}">${k}</option>`);
            
            mS.innerHTML = "";
            Object.entries(db.members).forEach(([n,e]) => mS.innerHTML += `<option value="${n}">${e} ${n}</option>`);
        }

        // 管理清單
        document.getElementById('ui_cards').innerHTML = Object.entries(db.cards).map(([k,v]) => 
            `<div class="list-chip"><span>💳 ${k} (結:${v.close} / 扣:${v.pay})</span> <b onclick="deleteCard('${k}')" style="color:red;cursor:pointer">✕</b></div>`).join('');
        
        document.getElementById('ui_mems').innerHTML = Object.entries(db.members).map(([n,e]) => 
            `<div class="list-chip"><span>${e} ${n}</span> <b onclick="deleteMem('${n}')" style="color:red;cursor:pointer">✕</b></div>`).join('');

        // 消費記錄
        const list = document.getElementById('main_list');
        list.innerHTML = "";
        const sorted = (db.records || []).slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
        sorted.forEach(r => {
            list.innerHTML += `<div class="card" style="padding:10px;"><div style="display:flex;align-items:center;">
                <input type="checkbox" ${r.settled?'checked':''} onchange="toggle(${r.id})">
                <div style="flex:1;margin-left:10px; ${r.settled?'text-decoration:line-through;opacity:0.5':''}">
                    <span class="tag">${r.card}</span> <b>${r.item}</b>
                    <div style="font-size:11px;color:#888">${r.date} | ${db.members[r.debtor] || '👤'} ${r.debtor}</div>
                </div>
                <div style="font-weight:bold;color:var(--accent)">$${parseFloat(r.amt).toLocaleString()}</div>
            </div></div>`;
        });
    }

    // --- 同步邏輯 ---
    async function saveAndSync() {
        const t = document.getElementById('cfg_token').value.trim();
        const g = document.getElementById('cfg_gist').value.trim();
        if(!t || !g) return alert("Token 或 ID 未填寫");
        
        settings.token = t;
        settings.gistId = g;
        localStorage.setItem(SET_KEY, JSON.stringify(settings));
        
        updateStatus("⏳ 連線嘗試中...");
        try {
            const res = await fetch(`https://api.github.com/gists/${settings.gistId}?t=${Date.now()}`, {
                headers: { "Authorization": `token ${settings.token}` }
            });

            if(res.ok) {
                const data = await res.json();
                const content = data.files["card_data.json"] ? data.files["card_data.json"].content : null;
                if(content) {
                    db = JSON.parse(content);
                    updateUI();
                    updateStatus("✅ 資料下載成功");
                } else {
                    updateStatus("✅ 連線成功 (雲端目前無內容)");
                }
            } else {
                updateStatus(`❌ GitHub 拒絕 (${res.status}) - 請檢查 Token`);
            }
        } catch(e) {
            updateStatus("⚠️ 網路攔截 (請檢查 Token 是否包含怪字元)");
        }
    }

    async function upload() {
        if(!settings.token || !settings.gistId) return;
        try {
            await fetch(`https://api.github.com/gists/${settings.gistId}`, {
                method: "PATCH",
                headers: { "Authorization": `token ${settings.token}` },
                body: JSON.stringify({ files: { "card_data.json": { content: JSON.stringify(db) } } })
            });
            updateStatus("✅ 雲端同步完畢");
        } catch(e) { console.error("Upload error", e); }
    }

    // --- 資料操作 ---
    function addNewCard() {
        const n = document.getElementById('add_c_name').value.trim();
        const c = document.getElementById('add_c_close').value;
        const p = document.getElementById('add_c_pay').value;
        if(!n || !c || !p) return alert("卡片資訊必填");
        db.cards[n] = { close: parseInt(c), pay: parseInt(p) };
        document.getElementById('add_c_name').value = "";
        updateUI(); upload();
    }

    function addNewMem() {
        const n = document.getElementById('add_m_name').value.trim();
        const e = document.getElementById('add_m_emoji').value.trim() || "👤";
        if(!n) return alert("請輸入成員名稱");
        db.members[n] = e;
        document.getElementById('add_m_name').value = "";
        updateUI(); upload();
    }

    function addRecord() {
        const amt = document.getElementById('f_amt').value;
        const card = document.getElementById('f_card').value;
        if(!amt || !card) return alert("請輸入金額並選擇卡片");
        db.records.push({
            id: Date.now(),
            card: card,
            date: document.getElementById('f_date').value,
            amt: amt,
            item: document.getElementById('f_item').value || "消費",
            debtor: document.getElementById('f_mem').value,
            settled: false
        });
        document.getElementById('f_amt').value = "";
        updateUI(); upload();
    }

    function deleteCard(k) { if(confirm('確定刪除該卡片？')){ delete db.cards[k]; updateUI(); upload(); } }
    function deleteMem(n) { if(n==='自己')return; if(confirm('確定刪除該成員？')){ delete db.members[n]; updateUI(); upload(); } }
    function toggle(id) { const r=db.records.find(x=>x.id===id); if(r){r.settled=!r.settled; updateUI(); upload();} }
    function updateStatus(t) { document.getElementById('syncStatus').innerText = "📡 " + t; }

    function parseSms() {
        const t = document.getElementById('ai_text').value;
        const amtM = t.match(/(金額|共|NT\$|幣)\s?(\d+)|(\d+)\s?元/);
        if (amtM) document.getElementById('f_amt').value = amtM[2] || amtM[3];
        const dateM = t.match(/(\d{2,3})[年\/\-\.](\d{1,2})[月\/\-\.](\d{1,2})/);
        if (dateM) {
            let y = parseInt(dateM[1]); if (y < 200) y += 1911;
            document.getElementById('f_date').value = `${y}-${dateM[2].padStart(2,'0')}-${dateM[3].padStart(2,'0')}`;
        }
    }

    window.onload = () => {
        if(settings.token) {
            document.getElementById('cfg_token').value = settings.token;
            document.getElementById('cfg_gist').value = settings.gistId;
        }
        updateUI();
        document.getElementById('f_date').valueAsDate = new Date();
    };
</script>
</body>
</html>
